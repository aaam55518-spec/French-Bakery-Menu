<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الكرواسون – مخبز الريف الفرنسي</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--green:#0A3E27;--gold:#D9C295;--bg:#f5edd8;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:'Noto Naskh Arabic',serif;color:var(--green);}
    header{background:var(--green);padding:1.5rem 1rem 1.2rem;text-align:center;position:relative;overflow:hidden;}
    header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(217,194,149,.04) 20px,rgba(217,194,149,.04) 40px);}
    .back-btn{position:absolute;top:1.1rem;left:1rem;background:none;border:1px solid rgba(217,194,149,.35);border-radius:4px;color:var(--gold);font-family:'Playfair Display',serif;font-style:italic;font-size:.75rem;padding:.3rem .7rem;text-decoration:none;z-index:2;}
    header h1{font-size:1.5rem;font-weight:700;color:var(--gold);margin-bottom:.15rem;}
    header p{font-family:'Playfair Display',serif;font-style:italic;font-size:.75rem;color:rgba(217,194,149,.6);letter-spacing:2px;}
    .section-head{display:flex;align-items:center;gap:.8rem;padding:1.4rem 1.2rem .6rem;}
    .section-head h2{font-size:1.35rem;font-weight:700;}
    .section-head span{font-family:'Playfair Display',serif;font-style:italic;font-size:.78rem;color:var(--gold);opacity:.7;}
    .line{flex:1;height:1px;background:rgba(10,62,39,.12);}
    .items-list{padding:0 1.2rem 1rem;}
    .item-row{display:flex;align-items:center;justify-content:space-between;padding:.85rem 0;border-bottom:1px solid rgba(10,62,39,.08);}
    .item-row:last-child{border-bottom:none;}
    .item-ar{font-size:1rem;font-weight:600;}
    .item-en{font-family:'Playfair Display',serif;font-style:italic;font-size:.72rem;color:var(--gold);margin-top:.1rem;}
    .price{font-family:'Playfair Display',serif;font-size:1rem;white-space:nowrap;margin-right:.5rem;}
    .iqd{font-size:.6rem;opacity:.5;}
    footer{text-align:center;padding:1.5rem 1rem;}
    footer p{font-family:'Playfair Display',serif;font-style:italic;font-size:.75rem;opacity:.4;}
  </style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">← Menu</a>
  <h1>الكرواسون</h1>
  <p>Croissant</p>
</header>

<div class="section-head"><h2>الكرواسون</h2><span>croissant</span><div class="line"></div></div>
<div class="items-list">
  <div class="item-row"><div><div class="item-ar">كرواسون سادة</div><div class="item-en">Butter Croissant</div></div><div class="price">1,000 <span class="iqd">IQD</span></div></div>
  <div class="item-row"><div><div class="item-ar">كرواسون شوكولاتة</div><div class="item-en">Chocolate Croissant</div></div><div class="price">1,000 <span class="iqd">IQD</span></div></div>
  <div class="item-row"><div><div class="item-ar">كرواسون جبنة</div><div class="item-en">Cheese Croissant</div></div><div class="price">1,000 <span class="iqd">IQD</span></div></div>
  <div class="item-row"><div><div class="item-ar">كرواسون فواكه</div><div class="item-en">Fruit-Filled Croissant</div></div><div class="price">1,500 <span class="iqd">IQD</span></div></div>
  <div class="item-row"><div><div class="item-ar">دونات</div><div class="item-en">Gourmet Donut</div></div><div class="price">1,000 <span class="iqd">IQD</span></div></div>
</div>

<footer>
  <p>French Countryside Bakery</p>
</footer>
</body>
</html>
